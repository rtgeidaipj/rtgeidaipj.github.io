<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>橋本真希ドローイング抽選</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* [EDIT 2026.07.18] 「雨の日の星空」の世界観（navy×gold・Shippori Mincho）に全面刷新。
           会場スタッフ・来場者が離れた距離からでも読めるよう、文字サイズも大幅に拡大した。 */
        :root {
            --bg-color: #fbf6ee;
            --card-bg: #fbf6ee;
            --navy: #1e3a5f;
            --gold: #c9a84c;
            --accent-warm: #c95a3a;
            --text-main: #2b2b2b;
            --text-sub: #666;
            --border-soft: #e0d6c4;
            --win-color: #c9a84c;
            --lose-color: #666;
            --font-main: "Shippori Mincho", "Yu Mincho", "YuMincho", serif;
            --font-eng: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: manipulation;
            user-select: none; -webkit-user-select: none;
        }
        .container { width: 100%; max-width: 460px; padding: 24px; box-sizing: border-box; z-index: 2; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-soft); padding: 44px 28px; text-align: center; }

        .eng-label { font-family: var(--font-eng); font-size: 13px; letter-spacing: 0.35em; color: var(--gold); }
        h1 { font-size: 30px; letter-spacing: 0.08em; margin: 16px 0 0; font-weight: 600; color: var(--navy); line-height: 1.5; }
        .subtitle { font-size: 16px; color: var(--text-sub); margin: 18px 0 28px; line-height: 1.9; }

        .slots-remaining {
            display: inline-block;
            font-size: 18px;
            letter-spacing: 0.05em;
            color: var(--navy);
            background: #fff;
            border: 1px solid var(--border-soft);
            padding: 12px 28px;
            margin-bottom: 32px;
        }
        .slots-remaining .num { font-size: 24px; font-weight: 600; color: var(--accent-warm); }

        .draw-button {
            background-color: var(--navy);
            color: var(--bg-color);
            border: none;
            border-radius: 8px;
            padding: 28px 0;
            font-family: var(--font-main);
            font-size: 26px;
            font-weight: 600;
            letter-spacing: 0.3em;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 320px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .draw-button:active:not(:disabled) { transform: scale(0.97); }
        .draw-button:disabled { background-color: #cfc6b3; color: #8a8072; cursor: not-allowed; }
        .result-container { margin-top: 28px; min-height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loading-spinner { border: 4px solid rgba(30, 58, 95, 0.12); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--navy); animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-message { font-family: var(--font-main); font-size: 28px; font-weight: 600; margin: 12px 0; opacity: 0; transform: translateY(10px); transition: all 0.5s ease; }
        .result-message.show { opacity: 1; transform: translateY(0); }
        .result-message.win { color: var(--win-color); font-size: 40px; letter-spacing: 0.15em; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .result-message.lose { color: var(--lose-color); font-size: 30px; }
        .description { font-size: 16px; color: var(--text-sub); margin-top: 18px; line-height: 1.9; }
        .reset-button {
            display: none;
            background-color: transparent;
            color: var(--text-sub);
            font-family: var(--font-eng);
            border: 1px solid #ccc;
            border-radius: 24px;
            padding: 14px 34px;
            font-size: 14px;
            letter-spacing: 0.15em;
            margin-top: 28px;
            cursor: pointer;
            animation: fadeIn 0.5s ease forwards;
        }
        .reset-button:active { background-color: #f0ece0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .confetti-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; display: none; }
        .confetti { position: absolute; width: 10px; height: 10px; background-color: var(--win-color); opacity: 0.85; top: -20px; border-radius: 2px; animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(105vh) rotate(720deg); opacity: 0; } }
    </style>
</head>
<body>
    <div id="confettiContainer" class="confetti-container"></div>
    <div class="container">
        <div class="card">
            <span class="eng-label">DRAWING GIFT</span>
            <h1>橋本真希<br>ドローイング抽選</h1>
            <div class="subtitle">あなたの目の前で、その場で抽選します</div>

            <div class="slots-remaining" id="slotsRemaining">本日の当選数を確認中…</div>

            <button id="drawBtn" class="draw-button" onclick="executeDraw()">抽選する</button>
            <div class="result-container">
                <div id="spinner" class="loading-spinner"></div>
                <div id="resultMsg" class="result-message"></div>
                <div id="descMsg" class="description"></div>
                <button id="resetBtn" class="reset-button" onclick="resetScreen()">画面をリセットする</button>
            </div>
        </div>
    </div>


    <script>
        /* [EDIT 2026.07.07] JSONP方式→通常のfetch方式に戻す
           （星空バッジで実証済みの、GAS Webアプリ+fetchの構成に統一） */
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwzHec6B2Fjz1YRCwMFjf5Gg60mc8virPYY3mz58I0kl0c_NHIFwgfkYlHXNnuWMLSx/exec";

        const drawBtn = document.getElementById("drawBtn");
        const spinner = document.getElementById("spinner");
        const resultMsg = document.getElementById("resultMsg");
        const descMsg = document.getElementById("descMsg");
        const confettiContainer = document.getElementById("confettiContainer");
        const resetBtn = document.getElementById("resetBtn");
        const slotsRemaining = document.getElementById("slotsRemaining");

        function refreshSlots() {
            /* [EDIT 2026.07.18] 日別の目標枚数が変動するようになったため、
               「残り枠/目標枚数」の表示をやめ、本日の当選数のみを表示する形に変更 */
            fetch(`${GAS_API_URL}?action=status&_=${Date.now()}`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.ok) {
                        const won = data.won || 0;
                        slotsRemaining.innerHTML = `本日の当選数 <span class="num">${won}</span> 件`;
                    } else {
                        slotsRemaining.textContent = '';
                    }
                })
                .catch(() => { slotsRemaining.textContent = ''; });
        }

        function executeDraw() {
            drawBtn.disabled = true;
            resultMsg.className = "result-message";
            resultMsg.innerText = "";
            descMsg.innerText = "";
            resetBtn.style.display = "none";
            confettiContainer.style.display = "none";
            confettiContainer.innerHTML = "";
            spinner.style.display = "block";

            const startTime = Date.now();
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            fetch(`${GAS_API_URL}?action=draw&_=${Date.now()}`, { method: 'GET', mode: 'cors', signal: controller.signal })
                .then(response => {
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error('Network response error');
                    return response.json();
                })
                .then(data => {
                    const elapsedTime = Date.now() - startTime;
                    const remainingTime = Math.max(0, 1200 - elapsedTime);

                    setTimeout(() => {
                        spinner.style.display = "none";
                        refreshSlots();

                        if (data && data.ok) {
                            if (data.result === "win") {
                                resultMsg.innerText = "✦ 当選 ✦";
                                resultMsg.classList.add("win", "show");
                                descMsg.innerText = "おめでとうございます！スタッフにこの画面をご提示いただき、橋本真希のドローイング（ラフスケッチ）をお受け取りください。";
                                startConfetti();
                                resetBtn.style.display = "block";
                            } else {
                                resultMsg.innerText = "落選";
                                resultMsg.classList.add("lose", "show");
                                if (data.reason === 'sold_out') {
                                    descMsg.innerText = "本日の当選枠はすべて出ました。ご来場いただき誠にありがとうございました。";
                                } else if (data.reason === 'closed') {
                                    descMsg.innerText = "現在は受付時間外です。ご来場いただき誠にありがとうございました。";
                                } else {
                                    descMsg.innerText = "誠に残念ながら、今回は「はずれ」となります。ご来場いただき誠にありがとうございました。展覧会を引き続きお楽しみください。";
                                }
                                // [EDIT 2026.07.07] 3秒後の自動リセットをやめ、当選時と同じく手動リセットボタンを表示
                                resetBtn.style.display = "block";
                            }
                        } else {
                            showError("大変混み合っています。もう一度お試しください。");
                        }
                    }, remainingTime);
                })
                .catch(error => {
                    clearTimeout(timeoutId);
                    const elapsedTime = Date.now() - startTime;
                    const remainingTime = Math.max(0, 1200 - elapsedTime);
                    setTimeout(() => {
                        spinner.style.display = "none";
                        if (error.name === 'AbortError') {
                            showError("通信時間を超過しました。電波の良い場所でもう一度お試しください。");
                        } else {
                            showError("通信エラーが発生しました。もう一度お試しください。");
                        }
                    }, remainingTime);
                });
        }

        function startConfetti() {
            confettiContainer.style.display = "block";
            const colors = ['#c9a84c', '#e8d4a0', '#1e3a5f', '#c95a3a'];
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 8 + 6 + 'px';
                confetti.style.height = Math.random() * 14 + 6 + 'px';
                confetti.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                confettiContainer.appendChild(confetti);
            }
        }

        function showError(message) {
            resultMsg.innerText = "ERROR";
            resultMsg.className = "result-message lose show";
            descMsg.innerText = message;
            resetBtn.style.display = "block";
        }

        function resetScreen() {
            drawBtn.disabled = false;
            resultMsg.className = "result-message";
            resultMsg.innerText = "";
            descMsg.innerText = "";
            resetBtn.style.display = "none";
            confettiContainer.style.display = "none";
            confettiContainer.innerHTML = "";
        }

        refreshSlots();
    </script>
</body>
</html>
